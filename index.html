<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Josslin ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Contenedor principal -->
    <div id="container"></div>

    <!-- Overlay central con nombre -->
    <div class="overlay">
        <div class="galaxy-info">
            <h1 class="galaxy-name">Josslin</h1>
            <p class="galaxy-subtitle">Mi galaxia favorita ✨</p>
        </div>
    </div>

    <!-- Controles de audio -->
    <div class="audio-player">
        <button id="playBtn" class="audio-btn" title="Reproducir">▶</button>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70" title="Volumen">
        <span class="volume-label">70%</span>
    </div>

    <!-- Audio element -->
    <audio id="audioTrack">
        <source src="music.mp3" type="audio/mpeg">
        Tu navegador no soporta audio HTML5
    </audio>

    <!-- Three.js librería -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Script personalizado -->
    <script src="script.js"></script>
</body>
</html>
